<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1976D2; display: flex; justify-content: center; min-height: 100vh; }
        .phone { background: #f0f2f5; width: 100%; max-width: 390px; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1976D2; padding: 16px; display: flex; align-items: center; gap: 12px; }
        .back-btn { color: white; font-size: 22px; background: none; border: none; cursor: pointer; }
        .header h1 { color: white; font-size: 17px; font-weight: bold; }
        .hero { background: #1976D2; padding: 20px; text-align: center; }
        .avatar { width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
        .hero-name { color: white; font-size: 18px; font-weight: bold; }
        .hero-email { color: #BBDEFB; font-size: 13px; margin-top: 4px; }
        .content { background: white; flex: 1; border-radius: 24px 24px 0 0; margin-top: -10px; padding: 20px; padding-bottom: 90px; }
        .info-card { background: #F3F8FF; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
        .info-label { font-size: 12px; color: #999; margin-bottom: 4px; }
        .info-value { font-size: 15px; font-weight: bold; color: #333; }
        .btn-logout { width: 100%; padding: 14px; background: #D32F2F; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-logout:hover { background: #B71C1C; }
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 390px; background: white; border-top: 1px solid #e0e0e0; display: flex; justify-content: space-around; padding: 8px 0; z-index: 99; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; padding: 4px 12px; cursor: pointer; }
        .nav-item .nav-icon { font-size: 22px; }
        .nav-item .nav-label { font-size: 10px; color: #999; }
        .nav-item.active .nav-label { color: #1976D2; font-weight: bold; }
    </style>
</head>
<body>
<div class="phone">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='home.html'">←</button>
        <h1>Profile Saya</h1>
    </div>

    <div class="hero">
        <div class="avatar">👤</div>
        <div class="hero-name" id="profileName">Loading...</div>
        <div class="hero-email" id="profileEmail">Loading...</div>
    </div>

    <div class="content">
        <div class="info-card">
            <div class="info-label">👤 Nama Lengkap</div>
            <div class="info-value" id="infoNama">-</div>
        </div>
        <div class="info-card">
            <div class="info-label">📧 Email</div>
            <div class="info-value" id="infoEmail">-</div>
        </div>
        <div class="info-card">
            <div class="info-label">🆔 User ID</div>
            <div class="info-value" id="infoUID" style="font-size:11px;word-break:break-all;">-</div>
        </div>
        <div class="info-card">
            <div class="info-label">📅 Terdaftar Sejak</div>
            <div class="info-value" id="infoCreated">-</div>
        </div>

        <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="https://maps.google.com/?q=Jayapura" class="nav-item" target="_blank">
            <span class="nav-icon">🗺️</span>
            <span class="nav-label">Maps</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Profile</span>
        </a>
        <a href="#" class="nav-item" onclick="logout()">
            <span class="nav-icon">🚪</span>
            <span class="nav-label">Logout</span>
        </a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
    auth.onAuthStateChanged(user => {
        if (!user) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('infoEmail').textContent = user.email;
            document.getElementById('infoUID').textContent = user.uid;

            // Ambil data akun dari Firebase Realtime Database
            database.ref('users/' + user.uid).once('value')
                .then(snapshot => {
                    const data = snapshot.val();
                    if (data) {
                        document.getElementById('profileName').textContent = data.nama;
                        document.getElementById('infoNama').textContent = data.nama;
                        const tgl = new Date(data.createdAt).toLocaleDateString('id-ID', {
                            day: 'numeric', month: 'long', year: 'numeric'
                        });
                        document.getElementById('infoCreated').textContent = tgl;
                    }
                });
        }
    });

    function logout() {
        auth.signOut().then(() => {
            window.location.href = 'login.html';
        });
    }
</script>
</body>
</html>
