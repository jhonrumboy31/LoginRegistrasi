<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1976D2; display: flex; justify-content: center; min-height: 100vh; }
        .phone { background: #f0f2f5; width: 100%; max-width: 390px; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1976D2; padding: 50px 24px 40px; text-align: center; position: relative; }
        .back { position: absolute; left: 16px; top: 16px; color: white; text-decoration: none; font-size: 22px; }
        .icon { font-size: 40px; margin-bottom: 10px; }
        .header h1 { color: white; font-size: 22px; }
        .header p { color: #BBDEFB; font-size: 13px; margin-top: 6px; }
        .content { background: white; flex: 1; border-radius: 24px 24px 0 0; margin-top: -16px; padding: 28px 20px; }
        .info-box { background: #E3F2FD; border-radius: 10px; padding: 12px; margin-bottom: 20px; font-size: 13px; color: #1565C0; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; color: #555; margin-bottom: 6px; font-size: 13px; font-weight: bold; }
        input { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; background: #fafafa; }
        input:focus { border-color: #1976D2; background: white; }
        .btn { width: 100%; padding: 14px; background: #1976D2; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; margin-bottom: 16px; }
        .btn:hover { background: #1565C0; }
        .btn:disabled { background: #90CAF9; cursor: not-allowed; }
        .link-text { text-align: center; font-size: 14px; }
        .link-text a { color: #1976D2; text-decoration: none; font-weight: bold; }
        .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .msg.success { background: #E8F5E9; color: #2E7D32; }
        .msg.error { background: #FFEBEE; color: #C62828; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <a href="login.html" class="back">←</a>
            <div class="icon">🔑</div>
            <h1>Lupa Password?</h1>
            <p>Kami kirimkan link reset ke email kamu</p>
        </div>
        <div class="content">
            <div class="info-box">Masukkan email yang terdaftar, kami akan mengirimkan link reset password</div>
            <div class="msg" id="msgBox"></div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Masukkan email kamu">
            </div>
            <button class="btn" id="btnReset" onclick="resetPassword()">Kirim Link Reset</button>
            <div class="link-text">Ingat password? <a href="login.html">Kembali ke Login</a></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // Logic reset password menggunakan Firebase Auth
        function resetPassword() {
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('btnReset');
            const msgBox = document.getElementById('msgBox');

            if (!email) {
                showMsg('error', '❌ Email wajib diisi!');
                return;
            }

            btn.disabled = true;
            msgBox.style.display = 'none';

            // Kirim email reset password via Firebase Auth
            auth.sendPasswordResetEmail(email)
                .then(() => {
                    showMsg('success', '✅ Link reset telah dikirim ke ' + email + '. Cek inbox/spam kamu!');
                    btn.disabled = false;
                })
                .catch(error => {
                    btn.disabled = false;
                    let pesan = '❌ Gagal mengirim email reset!';
                    if (error.code === 'auth/user-not-found') pesan = '❌ Email tidak terdaftar!';
                    if (error.code === 'auth/invalid-email') pesan = '❌ Format email tidak valid!';
                    showMsg('error', pesan);
                });
        }

        function showMsg(type, text) {
            const msgBox = document.getElementById('msgBox');
            msgBox.className = 'msg ' + type;
            msgBox.textContent = text;
            msgBox.style.display = 'block';
        }
    </script>
</body>
</html>
